        input[type=range] {
            -webkit-appearance: none; 
            background: transparent;

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;

        }

        // --- CONVERSOR ROBUSTO DE URLS ---
        const convertUrlToBase64 = async (url) => {
            if (!url) return null;
            if (url.startsWith('data:') || url.startsWith('blob:')) return url;
            const fetchImage = async (targetUrl) => {
                const response = await fetch(targetUrl);
                if (!response.ok) throw new Error('Error red');
                const blob = await response.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            };
            try { return await fetchImage(url); } catch (e1) {
                try { return await fetchImage(`https://corsproxy.io/?${encodeURIComponent(url)}`); } catch (e2) {
                    try { return await fetchImage(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`); } catch (e3) {
                        return url; 
                    }
                }
            }
        };

                setImgSrc(src); 
                if (!src || src.startsWith('data:') || src.startsWith('blob:')) return;
                let isActive = true;
                const convert = async () => {
                    const safeBase64 = await convertUrlToBase64(src);
                    if (isActive && safeBase64) setImgSrc(safeBase64);
                };
                convert();
                return () => { isActive = false; };
            }, [src]);

            return <img src={imgSrc} alt={alt} className={className} style={style} crossOrigin="anonymous" />;
        };

            // GENERADOR DE FECHAS AUTOMÁTICO
            const getFormattedMatchInfo = () => {
                let str = '';
                if (data.matchDate) {
                    const parts = data.matchDate.split('-');
                    const d = new Date(parts[0], parts[1]-1, parts[2]);
                    const dias = ['DOMINGO', 'LUNES', 'MARTES', 'MIÉRCOLES', 'JUEVES', 'VIERNES', 'SÁBADO'];
                    str += `${dias[d.getDay()]} ${parts[2]}/${parts[1]}`;
                }
                if (data.matchTime) {
                    str += str ? ` | ${data.matchTime}HS` : `${data.matchTime}HS`;

                if (data.matchStadium) {
                    str += str ? ` | ESTADIO ${data.matchStadium.toUpperCase()}` : `ESTADIO ${data.matchStadium.toUpperCase()}`;

            const togglePlayer = (index, forFormation = false) => {

            const handleImageUpload = (e) => {

            const handleUrlInput = async () => {
                const url = prompt("Ingresa la URL de la imagen:");

                    const base64 = await convertUrlToBase64(url);
                    setImage(base64 || url); 
                    setImagePos({x:0, y:0});
                    setImageScale(1); 
                    setLoading(false);
                }
            };

            const handlePasteButton = async () => {
                try {
                    if (!navigator.clipboard || !navigator.clipboard.read) {
                        throw new Error("No soportado");
                    }
                    const clipboardItems = await navigator.clipboard.read();
                    let foundImage = false;
                    for (const clipboardItem of clipboardItems) {
                        const imageTypes = clipboardItem.types.filter(type => type.startsWith('image/'));
                        if (imageTypes.length > 0) {
                            const blob = await clipboardItem.getType(imageTypes[0]);
                            const reader = new FileReader();
                            reader.onloadend = () => {
                                setImage(reader.result);
                                setImagePos({x:0, y:0});
                                setImageScale(1);
                            };
                            reader.readAsDataURL(blob);
                            foundImage = true;
                            break;
                        }
                    }
                    if (!foundImage) alert("No se encontró imagen copiada.");
                } catch (err) {
                    console.error(err);
                    alert("Tu navegador bloquea el pegado directo. Haz clic sobre la pantalla oscura y usa Ctrl+V / Cmd+V.");
                }
            };

            const handleGlobalPaste = (e) => {
                const items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        const blob = items[i].getAsFile();
                        const reader = new FileReader();
                        reader.onloadend = () => { setImage(reader.result); setImagePos({x:0, y:0}); setImageScale(1); };
                        reader.readAsDataURL(blob);
                    }
                }
            };

            // --- DESCARGA CON SOPORTE NATIVO PARA MÓVILES (BLOB) ---
            const handleDownload = async () => {
                if (!canvasRef.current || !wrapperRef.current) return;
                setLoading(true);
                
                try {
                    await Promise.race([
                        document.fonts.ready,
                        new Promise(resolve => setTimeout(resolve, 2000))
                    ]);
                    
                    const originalTransform = wrapperRef.current.style.transform;
                    wrapperRef.current.style.transform = 'scale(1)';
                    
                    await new Promise(resolve => setTimeout(resolve, 500)); 

                    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth < 768;
                    const ratio = isMobile ? 1.5 : 3; 

                    let dataUrl;
                    if (window.htmlToImage) {
                        try {
                            dataUrl = await window.htmlToImage.toPng(canvasRef.current, {
                                pixelRatio: ratio,
                                quality: 0.95,
                                backgroundColor: THEME.bg,
                                style: { transform: 'none' }
                            });
                        } catch (e) {
                            console.warn("html-to-image falló, intentando fallback", e);
                        }
                    }

                    if (!dataUrl && window.html2canvas) {
                        const canvas = await window.html2canvas(canvasRef.current, {
                            scale: ratio,
                            useCORS: true,
                            backgroundColor: THEME.bg,
                        });
                        dataUrl = canvas.toDataURL('image/png', 0.95);
                    }

                    if (!dataUrl) throw new Error("Ningún renderizador funcionó");

                    wrapperRef.current.style.transform = originalTransform;

                    // CONVERSIÓN A BLOB
                    const arr = dataUrl.split(',');
                    const mime = arr[0].match(/:(.*?);/)[1];
                    const bstr = atob(arr[1]);
                    let n = bstr.length;
                    const u8arr = new Uint8Array(n);
                    while(n--){
                        u8arr[n] = bstr.charCodeAt(n);
                    }
                    const blob = new Blob([u8arr], {type:mime});
                    const blobUrl = URL.createObjectURL(blob);

                    const link = document.createElement('a');
                    link.download = `grafica-${activeTemplate}-${Date.now()}.png`;
                    link.href = blobUrl;
                    link.click();

                    setTimeout(() => URL.revokeObjectURL(blobUrl), 2000);
                } catch (err) { 
                    console.error("Error capturando:", err);
                    alert("Error al descargar. Tu dispositivo se quedó sin memoria, prueba usar un navegador diferente o desde PC."); 
                    if (wrapperRef.current) wrapperRef.current.style.transform = `scale(${previewScale})`;
                } finally {
                    setLoading(false);
                }

                                        <div className="flex gap-2">
                                            <input type="date" value={data.matchDate} onChange={(e) => handleInputChange('matchDate', e.target.value)} className="w-1/2 bg-slate-900 p-2 rounded text-xs" />
                                            <input type="time" value={data.matchTime} onChange={(e) => handleInputChange('matchTime', e.target.value)} className="w-1/2 bg-slate-900 p-2 rounded text-xs" />
                                        </div>
                                        <input type="text" value={data.matchStadium} onChange={(e) => handleInputChange('matchStadium', e.target.value)} className="w-full bg-slate-900 p-2 rounded text-xs" placeholder="Estadio (Ej: KEMPES)" />
                                        
                                        {activeTemplate === TEMPLATES.CONVOCADOS && (
                                            <input type="text" value={data.rivalName} onChange={(e) => handleInputChange('rivalName', e.target.value)} className="w-full bg-slate-900 p-2 rounded text-xs mt-2" placeholder="Nombre Rival" />
                                        )}
                                        <input type="text" value={data.dtName} onChange={(e) => handleInputChange('dtName', e.target.value)} className="w-full bg-slate-900 p-2 rounded text-xs mt-2" placeholder="Nombre DT" />
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-center mb-2">
                                            <label className="text-xs font-bold text-slate-400">SELECCIONAR JUGADORES</label>
                                            <span className="text-[10px] text-slate-500">{roster.filter(p=>p.selected).length} Sel.</span>
                                        </div>
                                        <div className="h-60 overflow-y-auto bg-slate-900 rounded p-2 custom-scrollbar">
                                            {roster.map((p, i) => (
                                                <div key={i} className="flex items-center gap-2 mb-1 hover:bg-slate-800 p-1 rounded">
                                                    <button onClick={() => togglePlayer(i, activeTemplate === TEMPLATES.FORMACION)}>
                                                        {p.selected ? <CheckSquare size={16} className="text-blue-500" /> : <Square size={16} className="text-slate-600" />}
                                                    </button>
                                                    <input type="text" value={p.number} onChange={(e) => updatePlayerNumber(i, e.target.value)} className="w-8 bg-black text-center text-xs p-1 rounded text-blue-300 border-none" />
                                                    <div className="flex-1">
                                                        <p className="text-xs font-bold text-white leading-none">{p.name}</p>
                                                        <p className="text-[10px] text-slate-500 leading-none mt-1">{p.pos}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {activeTemplate === TEMPLATES.FORMACION && (
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 mb-2 block">ORDENAR FORMACIÓN (Arrastrar)</label>
                                            <div className="space-y-1 bg-slate-900 p-2 rounded">
                                                {data.formationList.map((p, i) => (
                                                    <div key={i} draggable onDragStart={(e) => onDragStart(e, i)} onDragOver={onDragOver} onDrop={(e) => onDrop(e, i)}
                                                        className="flex items-center gap-2 bg-slate-800 p-2 rounded cursor-move hover:bg-slate-700 transition-colors"
                                                    >
                                                        <GripVertical size={14} className="text-slate-500"/>
                                                        <span className="text-xs font-bold text-blue-400 w-6">{p.number}</span>
                                                        <span className="text-xs text-white">{p.name}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTemplate === TEMPLATES.NOTICIA_ESPECIAL && (
                                <div className="space-y-4">
                                    <input type="text" value={data.specialTitle} onChange={(e) => handleInputChange('specialTitle', e.target.value)} className="w-full bg-slate-900 p-2 rounded text-sm font-bold" placeholder="TÍTULO GRANDE" />
                                    <textarea value={data.specialBody} onChange={(e) => handleInputChange('specialBody', e.target.value)} className="w-full h-64 bg-slate-900 p-2 rounded text-xs" placeholder="Escribe la noticia aquí..." />
                                </div>
                            )}

                            {activeTemplate === TEMPLATES.NOTICIA_COMUN && (
                                <div className="space-y-4">
                                    <div className="flex items-center gap-2 mb-2">
                                        <button onClick={() => handleInputChange('newsShowTag', !data.newsShowTag)}>
                                            {data.newsShowTag ? <CheckSquare size={16} className="text-blue-500"/> : <Square size={16} className="text-slate-500"/>}
                                        </button>
                                        <label className="text-xs text-slate-300">Mostrar Etiqueta</label>
                                    </div>
                                    {data.newsShowTag && (
                                        <div className="flex gap-2">
                                            <input type="text" value={data.newsTag} onChange={(e) => handleInputChange('newsTag', e.target.value)} className="flex-1 bg-slate-900 p-2 rounded text-sm text-center" placeholder="ETIQUETA" />
                                            <input type="color" value={data.newsTagColor} onChange={(e) => handleInputChange('newsTagColor', e.target.value)} className="w-10 h-full rounded cursor-pointer border-none bg-transparent" />
                                        </div>
                                    )}
                                    <input type="text" value={data.newsTitle} onChange={(e) => handleInputChange('newsTitle', e.target.value)} className="w-full bg-slate-900 p-2 rounded text-sm font-bold text-blue-300" placeholder="TITULAR" />
                                    <textarea value={data.newsSubtitle} onChange={(e) => handleInputChange('newsSubtitle', e.target.value)} className="w-full h-32 bg-slate-900 p-2 rounded text-sm" placeholder="Bajada de la noticia..." />
                                </div>
                            )}

                            {(activeTemplate === TEMPLATES.HOY_JUEGA || activeTemplate === TEMPLATES.RESULTADO_FINAL) && (
                                <div className="space-y-6">
                                    <div className="bg-slate-700/30 p-2 rounded space-y-2 mb-4 border border-slate-600">
                                        <label className="text-xs font-bold text-blue-300">Posición de Escudos/Resultado</label>
                                        <div className="flex gap-2">
                                            <select value={data.hjLogosPosX} onChange={(e) => handleInputChange('hjLogosPosX', e.target.value)} className="w-1/2 bg-slate-900 p-2 rounded text-xs text-center font-bold">
                                                <option value="right">Derecha</option>
                                                <option value="left">Izquierda</option>
                                            </select>
                                            <select value={data.hjLogosPosY} onChange={(e) => handleInputChange('hjLogosPosY', e.target.value)} className="w-1/2 bg-slate-900 p-2 rounded text-xs text-center font-bold">
                                                <option value="top">Superior</option>
                                                <option value="bottom">Inferior</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="bg-slate-800 p-2 rounded space-y-2 border border-slate-600">
                                        <label className="text-xs font-bold text-slate-400 flex justify-between items-center">
                                            INFO CENTRAL <Trophy size={12}/>
                                        </label>
                                        
                                        <select className="w-full bg-slate-900 p-1 rounded text-[10px]" onChange={(e) => handleTournamentChange(e.target.value)}>
                                            <option value="">Cambiar Torneo...</option>
                                            {LEAGUES_DB.map((l, i) => <option key={i} value={l.url}>{l.name}</option>)}
                                        </select>
                                        
                                        {activeTemplate === TEMPLATES.RESULTADO_FINAL && (
                                            <div className="flex gap-2 mt-2">
                                                <input type="text" value={data.resScore1} onChange={(e) => handleInputChange('resScore1', e.target.value)} className="w-1/2 bg-slate-900 p-1 rounded text-lg text-center font-bold" placeholder="Goles Eq 1" />
                                                <input type="text" value={data.resScore2} onChange={(e) => handleInputChange('resScore2', e.target.value)} className="w-1/2 bg-slate-900 p-1 rounded text-lg text-center font-bold" placeholder="Goles Eq 2" />
                                            </div>
                                        )}
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-slate-700/30 p-2 rounded space-y-2">
                                            <label className="text-[10px] font-bold text-blue-300 uppercase">EQUIPO 1 {activeTemplate === TEMPLATES.HOY_JUEGA || activeTemplate === TEMPLATES.RESULTADO_FINAL ? '(ARRIBA)' : ''}</label>
                                            <select className="w-full bg-slate-900 p-1 rounded text-[10px]" onChange={(e) => handleTeamChange(1, e.target.value)}>
                                                <option value="">Cambiar Escudo...</option>
                                                {TEAMS_DB.map((t, i) => <option key={i} value={t.url}>{t.name}</option>)}
                                            </select>
                                            
                                            <div className="flex items-center justify-between gap-1 mt-1">
                                                <span className="text-[9px]">Grad:</span>
                                                <input type="color" value={data.resColor1A} onChange={(e) => handleInputChange('resColor1A', e.target.value)} className="w-5 h-6 rounded cursor-pointer bg-transparent border-none p-0" title="Color Superior" />
                                                <input type="color" value={data.resColor1B} onChange={(e) => handleInputChange('resColor1B', e.target.value)} className="w-5 h-6 rounded cursor-pointer bg-transparent border-none p-0" title="Color Medio" />
                                                <input type="color" value={data.resColor1C} onChange={(e) => handleInputChange('resColor1C', e.target.value)} className="w-5 h-6 rounded cursor-pointer bg-transparent border-none p-0" title="Color Inferior" />
                                            </div>
                                            
                                            {activeTemplate !== TEMPLATES.HOY_JUEGA && (
                                                <input type="text" value={data.resTeam1Name} onChange={(e) => handleInputChange('resTeam1Name', e.target.value)} className="w-full bg-slate-900 p-1 rounded text-xs font-bold uppercase mt-2" placeholder="Nombre" />
                                            )}
                                        </div>

                                        <div className="bg-slate-700/30 p-2 rounded space-y-2">
                                            <label className="text-[10px] font-bold text-red-300 uppercase">EQUIPO 2 {activeTemplate === TEMPLATES.HOY_JUEGA || activeTemplate === TEMPLATES.RESULTADO_FINAL ? '(ABAJO)' : ''}</label>
                                            <select className="w-full bg-slate-900 p-1 rounded text-[10px]" onChange={(e) => handleTeamChange(2, e.target.value)}>
                                                <option value="">Cambiar Escudo...</option>
                                                {TEAMS_DB.map((t, i) => <option key={i} value={t.url}>{t.name}</option>)}
                                            </select>
                                            
                                            <div className="flex items-center justify-between gap-1 mt-1">
                                                <span className="text-[9px]">Grad:</span>
                                                <input type="color" value={data.resColor2A} onChange={(e) => handleInputChange('resColor2A', e.target.value)} className="w-5 h-6 rounded cursor-pointer bg-transparent border-none p-0" title="Color Superior" />
                                                <input type="color" value={data.resColor2B} onChange={(e) => handleInputChange('resColor2B', e.target.value)} className="w-5 h-6 rounded cursor-pointer bg-transparent border-none p-0" title="Color Medio" />
                                                <input type="color" value={data.resColor2C} onChange={(e) => handleInputChange('resColor2C', e.target.value)} className="w-5 h-6 rounded cursor-pointer bg-transparent border-none p-0" title="Color Inferior" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                  )}

                  {/* VISOR Y CAPTURA */}
                  <div 
                    className={`flex-1 flex items-center justify-center relative overflow-hidden transition-all duration-300 ${isPreviewMode ? 'fixed inset-0 z-50 bg-black' : 'bg-slate-950/50 p-4'}`} 
                    onPaste={handleGlobalPaste} 
                    tabIndex="0"
                  >
                     
                     <div className="absolute top-4 right-4 z-50 flex gap-2">
                         <button 
                            onClick={() => setIsPreviewMode(!isPreviewMode)} 
                            className="bg-black/50 hover:bg-blue-600 text-white p-3 rounded-full backdrop-blur-md transition-all shadow-lg border border-white/20"
                         >
                            {isPreviewMode ? <Minimize2 size={24} /> : <Eye size={24} />}
                         </button>
                     </div>

                     {/* Contenedor que Escala para la Vista */}
                     <div 
                        ref={wrapperRef}
                        style={{ 
                            transform: isPreviewMode ? `scale(${Math.min(window.innerWidth / 1080, window.innerHeight / 1350) * 0.95})` : `scale(${previewScale})`, 
                            transformOrigin: 'center',
                        }} 
                        className="shadow-2xl"
                     >
                        <div 
                            ref={canvasRef} 
                            style={{ 
                                width: '1080px', height: '1350px', 
                                backgroundColor: THEME.bg,
                            }} 
                            className="overflow-hidden shadow-2xl relative bg-[#021024]"
                        >
                            {renderActiveTemplate()}
                        </div>
                     </div>

                     {!isPreviewMode && (
                         <button onClick={handleDownload} disabled={loading} className="absolute bottom-6 right-6 bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-full font-bold shadow-lg flex items-center gap-2 z-30 transition-transform hover:scale-105 active:scale-95">
                            {loading ? 'PROCESANDO...' : <><Download size={20} /> DESCARGAR HD</>}
                         </button>
                     )}
                     
                     {isPreviewMode && (
                         <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-4 z-50">
                             <button onClick={handleDownload} disabled={loading} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-full font-bold shadow-2xl flex items-center gap-3 transition-transform hover:scale-105 active:scale-95 border-2 border-white/20">
                                {loading ? 'GENERANDO...' : <><Save size={24} /> GUARDAR IMAGEN</>}
                             </button>
                         </div>
                     )}
                  </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
